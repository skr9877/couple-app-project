<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couple App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            background: white;
            border-radius: 20px;
            padding: 60px 80px;
            box-shadow: 0 20px 60px rgba(255, 100, 130, 0.2);
        }
        .heart { font-size: 64px; margin-bottom: 20px; }
        h1 { color: #e91e63; font-size: 2rem; margin-bottom: 10px; }
        p { color: #888; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="heart">💕</div>
        <h1>Couple App</h1>
        <p>서버가 정상적으로 실행 중입니다.</p>
    </div>
</body>
</html>
