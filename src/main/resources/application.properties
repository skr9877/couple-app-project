spring.application.name=CoupleAppProject

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/coupleapp
spring.datasource.username=coupleapp
spring.datasource.password=coupleapp1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
