spring.application.name=CoupleAppProject

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/coupleapp
spring.datasource.username=coupleapp
spring.datasource.password=coupleapp1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# File Upload
app.upload.path=upload-files
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB
